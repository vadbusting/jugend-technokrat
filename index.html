<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUGEND - Premium Design Collection</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-color: #f3f4f6;
            --accent-color: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --text-secondary: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            max-width: 600px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.05em;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.5;
        }

        main {
            width: 100%;
            max-width: 1200px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(59, 130, 246, 0.4);
        }

        .image-container {
            width: 100%;
            padding-top: 100%; /* 1:1 Aspect Ratio */
            position: relative;
            background: rgba(0, 0, 0, 0.2);
        }

        .image-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .card:hover .image-container img {
            transform: scale(1.05);
        }

        .content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 1.5rem;
        }

        .btn {
            display: inline-block;
            width: 100%;
            text-align: center;
            padding: 0.8rem 1rem;
            background: var(--accent-gradient);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .no-products {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        footer {
            margin-top: 5rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>JUGEND</h1>
        <p>Haende noch jung - Koepfe noch unverdorben. Jugend lenkt die Welt und bringt die Adoleszenz auf den Plan.</p>
    </header>

    <main>
        <div class="grid" id="product-grid">
            <div class="no-products">商品を読み込み中...</div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 JUGEND. All rights reserved.</p>
    </footer>

    <script>
        async function loadProducts() {
            const grid = document.getElementById('product-grid');
            try {
                const response = await fetch('products.json');
                if (!response.ok) throw new Error('Failed to load products.json');
                const products = await response.json();
                
                if (products.length === 0) {
                    grid.innerHTML = '<div class="no-products">現在登録されている商品はありません。</div>';
                    return;
                }

                grid.innerHTML = '';
                products.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="image-container">
                            <img src="${p.image_url}" alt="${p.title}" loading="lazy">
                        </div>
                        <div class="content">
                            <div>
                                <h3 class="title">${p.title}</h3>
                                <p class="description">${p.description || ''}</p>
                            </div>
                            <a href="${p.zazzle_url}" target="_blank" class="btn">Zazzle で購入する</a>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error(error);
                grid.innerHTML = '<div class="no-products">商品の読み込みに失敗しました。</div>';
            }
        }
        loadProducts();
    </script>
</body>
</html>
