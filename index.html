<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUGEND TECHNOKRAT — Premium Avant-Garde Collection</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet">
    
    <!-- Three.js & GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg-color: #030303;
            --text-color: #ffffff;
            --text-secondary: #8c8c8c;
            --accent-color: #ffffff;
            --border-color: rgba(255, 255, 255, 0.08);
            --font-editorial: "Playfair Display", Georgia, serif;
            --font-sans: "Plus Jakarta Sans", sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-sans);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 3D WebGL Canvas Background */
        #webgl-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.65;
        }

        /* Container Overlay */
        .page-overlay {
            position: relative;
            z-index: 1;
            padding: 4vw;
        }

        /* Header Style (Undercoverism Inspired Minimalist Editorial) */
        header {
            margin-bottom: 8vw;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 3vw;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            mix-blend-mode: difference;
        }

        .logo-area h1 {
            font-family: var(--font-editorial);
            font-size: clamp(2.5rem, 6.5vw, 6.5rem);
            font-weight: 300;
            letter-spacing: -0.04em;
            line-height: 0.9;
            text-transform: uppercase;
        }

        .logo-area .subtitle {
            font-size: 0.8rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-top: 1rem;
        }

        .header-meta {
            text-align: right;
            max-width: 380px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.6;
            letter-spacing: 0.05em;
        }

        /* Asymmetric Editorial Grid */
        .editorial-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 4vw 2vw;
            margin-bottom: 8vw;
        }

        .product-card {
            grid-column: span 4;
            display: flex;
            flex-direction: column;
            position: relative;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 1.5rem;
            transition: border-color 0.4s, background-color 0.4s;
            cursor: pointer;
        }

        .product-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.02);
        }

        /* Alternate Grid Spans for Asymmetry */
        .product-card:nth-child(3n+1) {
            grid-column: span 5;
        }
        .product-card:nth-child(3n+2) {
            grid-column: span 4;
            margin-top: 4vw;
        }
        .product-card:nth-child(3n+3) {
            grid-column: span 3;
            margin-top: -2vw;
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            padding-top: 125%; /* 4:5 Portrait Ratio */
            overflow: hidden;
            background: #080808;
            margin-bottom: 1.5rem;
        }

        .image-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%) contrast(110%);
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), filter 0.8s;
        }

        .product-card:hover .image-wrapper img {
            transform: scale(1.04);
            filter: grayscale(0%) contrast(100%);
        }

        /* Product Details Typography */
        .product-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-top: auto;
        }

        .product-title {
            font-family: var(--font-editorial);
            font-size: 1.4rem;
            font-style: italic;
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .product-price {
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            font-weight: 500;
        }

        .product-desc {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            max-width: 90%;
        }

        /* High-End Direct Shop Button */
        .shop-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            transition: background-color 0.3s, border-color 0.3s;
            margin-top: auto;
        }

        .product-card:hover .shop-btn {
            background-color: var(--text-color);
            color: var(--bg-color);
            border-color: var(--text-color);
        }

        .shop-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            transition: transform 0.3s;
        }

        .product-card:hover .shop-btn svg {
            transform: translateX(4px);
        }

        .loading-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 6rem;
            font-family: var(--font-editorial);
            font-style: italic;
            color: var(--text-secondary);
            font-size: 1.5rem;
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--border-color);
            padding: 4vw 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-secondary);
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            mix-blend-mode: difference;
        }

        /* Responsive Layout Grid Overrides */
        @media (max-width: 1024px) {
            .product-card, .product-card:nth-child(3n+1), .product-card:nth-child(3n+2), .product-card:nth-child(3n+3) {
                grid-column: span 6;
                margin-top: 0;
            }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 2rem;
            }
            .header-meta {
                text-align: left;
            }
            .product-card, .product-card:nth-child(3n+1), .product-card:nth-child(3n+2), .product-card:nth-child(3n+3) {
                grid-column: span 12;
            }
            footer {
                flex-direction: column;
                gap: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- WebGL Canvas for 3D Background -->
    <canvas id="webgl-bg"></canvas>

    <div class="page-overlay">
        <!-- Minimalist Editorial Header -->
        <header>
            <div class="logo-area">
                <h1 id="brand-title">JUGEND<br>TECHNOKRAT</h1>
                <div class="subtitle">AUTOMATED AVANT-GARDE</div>
            </div>
            <div class="header-meta">
                <p>Haende noch jung - Koepfe noch unverdorben. Jugend lenkt die Welt und bringt die Adoleszenz auf den Plan.</p>
            </div>
        </header>

        <!-- Asymmetric Product Section -->
        <main>
            <div class="editorial-grid" id="product-grid">
                <div class="loading-msg">Loading JUGEND Collection...</div>
            </div>
        </main>

        <!-- Footer -->
        <footer>
            <div class="foot-left">JUGEND TECHNOKRAT &copy; 2026</div>
            <div class="foot-right">Powered by Google Cloud & Zazzle</div>
        </footer>
    </div>

    <!-- WebGL 3D Background Script -->
    <script>
        const canvas = document.getElementById('webgl-bg');
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 15;

        // Create 3D Geometric Mesh (Particle Network)
        const geometry = new THREE.IcosahedronGeometry(6, 2);
        const count = geometry.attributes.position.count;

        // Lines mesh
        const wireMaterial = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            wireframe: true,
            transparent: true,
            opacity: 0.05
        });
        const mesh = new THREE.Mesh(geometry, wireMaterial);
        scene.add(mesh);

        // Particles mesh (dots on vertices)
        const pointsMaterial = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.06,
            transparent: true,
            opacity: 0.3
        });
        const points = new THREE.Points(geometry, pointsMaterial);
        scene.add(points);

        // Resize Event
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Mouse Move Interaction
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;

        window.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth) - 0.5;
            mouseY = (event.clientY / window.innerHeight) - 0.5;
        });

        // Animation Loop
        const animate = () => {
            targetX += (mouseX - targetX) * 0.05;
            targetY += (mouseY - targetY) * 0.05;

            // Slowly rotate geometry
            mesh.rotation.y += 0.0015;
            mesh.rotation.x += 0.0008;
            points.rotation.y += 0.0015;
            points.rotation.x += 0.0008;

            // Apply interactive parallax
            mesh.position.x = targetX * 1.5;
            mesh.position.y = -targetY * 1.5;
            points.position.x = targetX * 1.5;
            points.position.y = -targetY * 1.5;

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        };
        animate();
    </script>

    <!-- Product Loader & GSAP Reveal Script -->
    <script>
        async function loadProducts() {
            const grid = document.getElementById('product-grid');
            try {
                const response = await fetch('products.json');
                if (!response.ok) throw new Error('Failed to load products.json');
                const products = await response.json();
                
                if (products.length === 0) {
                    grid.innerHTML = '<div class="loading-msg">No designs released yet.</div>';
                    return;
                }

                grid.innerHTML = '';
                products.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <div class="image-wrapper">
                            <img src="${p.image_url}" alt="${p.title}">
                        </div>
                        <div class="product-info">
                            <div>
                                <h3 class="product-title">${p.title}</h3>
                                <p class="product-desc">${p.description || ''}</p>
                            </div>
                            <span class="product-price">${p.price || ''}</span>
                        </div>
                        <a href="${p.zazzle_url}" target="_blank" class="shop-btn">
                            Buy on Zazzle
                            <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </a>
                    `;
                    grid.appendChild(card);
                });

                // GSAP Grid Items Entrance Animation
                gsap.from(".product-card", {
                    opacity: 0,
                    y: 50,
                    duration: 1.2,
                    stagger: 0.15,
                    ease: "power3.out"
                });

            } catch (error) {
                console.error(error);
                grid.innerHTML = '<div class="loading-msg">Failed to load JUGEND Collection.</div>';
            }
        }

        // GSAP Header Reveal Animation
        window.addEventListener('DOMContentLoaded', () => {
            gsap.from("#brand-title", {
                opacity: 0,
                y: 80,
                duration: 1.5,
                ease: "power4.out"
            });
            gsap.from(".subtitle, .header-meta", {
                opacity: 0,
                delay: 0.5,
                duration: 1.2,
                stagger: 0.2,
                ease: "power2.out"
            });
            loadProducts();
        });
    </script>
</body>
</html>
